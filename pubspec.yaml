name: companion_for_cacao
description: "A companion app for the Cacao board game and its expansions,
  providing digital tools for score tracking, rule consultation,
  and game management."
publish_to: 'none'
version: 2.3.0+5

environment:
  sdk: ^3.9.0

dependencies:
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  flutter:
    sdk: flutter
  flutter_advanced_drawer: ^1.5.0
  flutter_markdown_plus: ^1.0.7
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  flutter_staggered_grid_view: ^0.7.0
  go_router: ^17.2.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  syncfusion_flutter_pdfviewer: ^34.1.31
  upgrader: ^13.5.0
  url_launcher: ^6.3.2
  reorderable_grid: ^1.0.13
  collection: ^1.19.1

dev_dependencies:
  ansicolor: ^2.0.3
  build_runner: ^2.14.1
  dart_pre_commit: ^6.1.1+1
  drift_dev: ^2.31.0
  flutter_test:
    sdk: flutter
  git_hooks: ^1.0.2
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/tiles/
    - assets/images/tiles/base/
    - assets/images/tiles/chocolatl/
    - assets/images/tiles/diamante/
    - assets/images/tiles/description/
    - assets/images/boardgames/
    - assets/images/preparation/
    - assets/initial_data/
    - assets/rules/
  fonts:
    - family: Burrito
      fonts:
        - asset: assets/fonts/burrito.ttf
    - family: Agenda
      fonts:
        - asset: assets/fonts/agenda_boldcondensed.ttf
          weight: 700
        - asset: assets/fonts/agenda_lightcondensed.ttf
          weight: 300
        - asset: assets/fonts/agenda_mediumcondensed.ttf
          weight: 500

dart_pre_commit:
  outdated: false
  analyze: false
