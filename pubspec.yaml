name: companion_for_cacao
description: "A companion app for the Cacao board game and its expansions,
  providing digital tools for score tracking, rule consultation,
  and game management."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_advanced_drawer: ^1.5.0
  flutter_markdown_plus: ^1.0.7
  flutter_riverpod: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  go_router: ^17.1.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  syncfusion_flutter_pdfviewer: ^32.2.9
  upgrader: ^12.5.0
  url_launcher: ^6.3.2

dev_dependencies:
  ansicolor: ^2.0.3
  build_runner: ^2.12.2
  dart_pre_commit: ^6.1.1+1
  drift_dev: ^2.32.0
  flutter_test:
    sdk: flutter
  git_hooks: ^1.0.2
  flutter_lints: ^6.0.0
  # riverpod_lint: ^3.1.3  # TODO: Re-enable when compatible with analyzer ^10.0.0 (drift_dev conflict)

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/tiles/
    - assets/images/tiles/description/
    - assets/images/boardgames/
    - assets/images/preparation/
    - assets/initial_data/
    - assets/rules/
  fonts:
    - family: Burrito
      fonts:
        - asset: assets/fonts/burrito.ttf
    - family: Agenda
      fonts:
        - asset: assets/fonts/agenda_boldcondensed.ttf
          weight: 700
        - asset: assets/fonts/agenda_lightcondensed.ttf
          weight: 300
        - asset: assets/fonts/agenda_mediumcondensed.ttf
          weight: 500

dart_pre_commit:
  outdated: false
  analyze: false
