org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Fix: Kotlin incremental compilation fails on Windows when project (D:) and
# pub cache (C:) are on different drives (RelocatableFileToPathConverter bug).
# Alternative permanent fix: set PUB_CACHE env var to D:\pub-cache
kotlin.incremental=false
