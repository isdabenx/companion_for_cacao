name: Pull Request Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  flutter-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # Informational only: failing PRs whenever ANY dependency has a newer
      # version turns CI red over time for reasons unrelated to the change.
      - name: Check outdated dependencies (informational)
        run: dart pub outdated || true

      - name: Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Format
        run: dart format --set-exit-if-changed .

      - name: Test
        run: flutter test
